<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealEngine CRM</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="topbar">
  <a href="/" class="logo">Deal<span>Engine</span></a>
  <nav>
    <a href="/" data-page="dashboard" class="active">Dashboard</a>
    <a href="/buyers" data-page="buyers">Buyers</a>
    <a href="/properties" data-page="properties">Properties</a>
    <a href="/contacts" data-page="contacts">Contacts</a>
    <a href="/activities" data-page="activities">Activity Log</a>
  </nav>
  <div class="quick-actions">
    <a href="/buyers/new" class="btn btn-sm">+ Buyer</a>
    <a href="/properties/new" class="btn btn-sm">+ Property</a>
    <a href="/activities/new" class="btn btn-sm btn-primary">+ Log Activity</a>
    <button class="btn btn-sm" onclick="signOut()" style="margin-left:8px;color:var(--text2);">Sign Out</button>
  </div>
</div>
<div class="container" id="app">
  <div class="loading">Loading…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
